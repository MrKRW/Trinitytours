<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tour Details – Trinity Tours</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* Premium Tour Details Styles */
    .tour-hero {
      position: relative;
      height: 60vh;
      min-height: 400px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      overflow: hidden;
    }
    .tour-hero-bg {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-size: cover;
      background-position: center;
      z-index: 1;
      transform: scale(1.05);
      animation: kenBurns 20s ease-out infinite alternate;
    }
    @keyframes kenBurns {
      from { transform: scale(1.05); }
      to { transform: scale(1.1); }
    }
    .tour-hero-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(to top, rgba(19, 21, 26, 0.9) 0%, rgba(19, 21, 26, 0.4) 50%, rgba(19, 21, 26, 0.1) 100%);
      z-index: 2;
    }
    .tour-hero-content {
      position: relative;
      z-index: 3;
      text-align: center;
      max-width: 800px;
      padding: 0 20px;
      opacity: 0;
      transform: translateY(30px);
      animation: fadeUp 1s forwards 0.5s;
    }
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
    .tour-hero-title {
      font-family: 'Playfair Display', serif;
      font-size: 3.5rem;
      margin-bottom: 1rem;
      text-shadow: 2px 4px 10px rgba(0,0,0,0.5);
    }
    .tour-hero-meta {
      display: inline-flex;
      gap: 15px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      padding: 10px 25px;
      border-radius: 30px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      font-size: 1.1rem;
      font-weight: 500;
    }

    .tour-layout {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 50px;
      padding: 80px 0;
    }
    @media (max-width: 992px) {
      .tour-layout {
        grid-template-columns: 1fr;
      }
    }

    /* Left Content */
    .tour-main h2 {
      font-family: 'Playfair Display', serif;
      font-size: 2.2rem;
      color: #D3A154;
      margin-bottom: 20px;
    }
    .tour-description {
      font-size: 1.1rem;
      line-height: 1.8;
      color: #4A5568;
      margin-bottom: 40px;
    }

    .highlights-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 50px;
    }
    .highlight-item {
      display: flex;
      align-items: center;
      gap: 15px;
      background: #f8f9fa;
      padding: 20px;
      border-radius: 12px;
      border: 1px solid #e9ecef;
      transition: transform 0.3s ease, border-color 0.3s ease;
      color: #1A1A2E;
    }
    .highlight-item:hover {
      transform: translateY(-5px);
      border-color: rgba(211, 161, 84, 0.5);
    }
    .highlight-icon {
      color: #D3A154;
    }

    /* Itinerary Accordion */
    .itinerary-list {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    .itinerary-item {
      background: #ffffff;
      border: 1px solid #e9ecef;
      border-radius: 12px;
      overflow: hidden;
      transition: all 0.3s ease;
    }
    .itinerary-header {
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 20px;
      cursor: pointer;
      user-select: none;
    }
    .itinerary-header:hover {
      background: #f8f9fa;
    }
    .itinerary-day {
      background: #D3A154;
      color: #13151A;
      font-weight: 700;
      padding: 5px 15px;
      border-radius: 20px;
      font-size: 0.9rem;
    }
    .itinerary-title {
      font-weight: 600;
      font-size: 1.1rem;
      flex: 1;
      color: #1A1A2E;
    }
    .itinerary-body {
      padding: 0 20px 20px 70px;
      color: #4A5568;
      line-height: 1.6;
      display: none;
    }
    .itinerary-item.active .itinerary-body {
      display: block;
    }
    .itinerary-item.active {
      border-color: rgba(211, 161, 84, 0.5);
      background: #fffdfa;
    }

    /* Right Sidebar */
    .tour-sidebar {
      position: sticky;
      top: 100px;
    }
    .booking-card {
      background: #ffffff;
      backdrop-filter: blur(20px);
      border: 1px solid #e9ecef;
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.08);
    }
    .booking-price {
      font-size: 2.5rem;
      font-weight: 800;
      color: #D3A154;
      margin-bottom: 10px;
      font-family: 'Playfair Display', serif;
    }
    .booking-price span {
      font-size: 1rem;
      color: #4A5568;
      font-family: 'Outfit', sans-serif;
      font-weight: 400;
    }
    .booking-card hr {
      border: none;
      height: 1px;
      background: #e9ecef;
      margin: 25px 0;
    }
    .booking-form .input-group {
      margin-bottom: 20px;
    }
    .booking-form input, .booking-form select, .booking-form textarea {
      width: 100%;
      background: #f8f9fa;
      border: 1px solid #ced4da;
      padding: 15px;
      border-radius: 8px;
      color: #1A1A2E;
      font-family: inherit;
    }
    .booking-form input::placeholder, .booking-form textarea::placeholder {
      color: #6c757d;
    }
    .booking-form input:focus, .booking-form select:focus, .booking-form textarea:focus {
      outline: none;
      border-color: #D3A154;
      background: #ffffff;
    }
    .booking-form .btn-submit {
      width: 100%;
      background: #D3A154;
      color: #13151A;
      border: none;
      padding: 16px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 1.1rem;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .booking-form .btn-submit:hover {
      background: #1A1A2E;
      color: #ffffff;
      transform: translateY(-2px);
    }
  </style>
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
</head>
<body>

  <!-- NAVBAR -->
  <header class="navbar" id="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">
        <img src="logo/logo_small.png" alt="Trinity Tours Logo" class="site-logo" />
      </a>
      <nav class="nav-links">
        <a href="index.html" class="nav-link">Home</a>
        <a href="destinations.html" class="nav-link">Destinations</a>

        <a href="about.html" class="nav-link">About Us</a>
        <a href="contact.html" class="nav-link">Contact</a>
      </nav>
    </div>
  </header>

  <!-- HERO -->
  <section class="tour-hero" id="tour-hero">
    <div class="tour-hero-bg" id="hero-bg"></div>
    <div class="tour-hero-overlay"></div>
    <div class="tour-hero-content">
      <h1 class="tour-hero-title" id="tour-title">Loading Tour...</h1>
      <div class="tour-hero-meta">
        <span id="tour-duration">--</span>
        <span>•</span>
        <span id="tour-category">--</span>
      </div>
    </div>
  </section>

  <!-- CONTENT -->
  <div class="container">
    <div class="tour-layout">
      <!-- Left Column -->
      <div class="tour-main">
        <h2>About This Tour</h2>
        <p class="tour-description" id="tour-desc">
          Loading description...
        </p>

        <h2>Tour Highlights</h2>
        <div class="highlights-grid" id="tour-highlights">
          <!-- Highlights injected here -->
        </div>

        <h2>Itinerary</h2>
        <div class="itinerary-list" id="tour-itinerary">
          <!-- Itinerary injected here -->
        </div>
      </div>

      <!-- Right Column -->
      <aside class="tour-sidebar">
        <div class="booking-card">
          <div class="booking-price" id="tour-price">
            $-- <span>/ person</span>
          </div>
          <p style="color: #4A5568; font-size: 0.95rem;">Book now to secure your adventure. No payment required today.</p>
          <hr />
          <form class="booking-form" onsubmit="event.preventDefault(); alert('Booking Inquiry Submitted Successfully!');">
            <div class="input-group">
              <input type="text" placeholder="Full Name" required />
            </div>
            <div class="input-group">
              <input type="email" placeholder="Email Address" required />
            </div>
            <div class="input-group">
              <input type="date" required />
            </div>
            <div class="input-group">
              <select required>
                <option value="" disabled selected>Number of Travelers</option>
                <option value="1">1 Traveler</option>
                <option value="2">2 Travelers</option>
                <option value="3">3 Travelers</option>
                <option value="4">4+ Travelers</option>
              </select>
            </div>
            <div class="input-group">
              <textarea rows="3" placeholder="Special Requests"></textarea>
            </div>
            <button type="submit" class="btn-submit">Submit Inquiry</button>
          </form>
        </div>
      </aside>
    </div>
  </div>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="container">
      <div class="footer-bottom" style="text-align:center; padding: 40px 0; border-top: 1px solid rgba(255,255,255,0.1); margin-top: 50px;">
        <p>&copy; 2026 Trinity Tours. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="js/main.js"></script>
  <script src="js/tour-data.js"></script>
  <script src="js/tour-details.js"></script>
</body>
</html>
